<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Admin — Srivaths &amp; Sulakshana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ivory:       #FAF6EF;
      --cream:       #F0E8D8;
      --mauve:       #A8192A;
      --deep-mauve:  #6B1F48;
      --gold:        #C6963A;
      --teal:        #2E7D7A;
      --text-dark:   #2A1A0F;
      --text-medium: #5C3D2E;
      --text-light:  #9C7B6A;
      --white:       #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background: var(--ivory);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      background: var(--text-dark);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #E8D4A0;
    }
    .admin-header-left p {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      margin-top: 0.15rem;
    }
    .admin-header-right { display: flex; gap: 0.75rem; align-items: center; }

    /* Buttons */
    .btn {
      padding: 0.65rem 1.4rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      border-radius: 0;
    }
    .btn-export {
      background: var(--teal);
      color: #fff;
    }
    .btn-export:hover { background: #245f5c; }
    .btn-refresh {
      background: transparent;
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .btn-home {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.65rem;
    }
    .btn-home:hover { color: rgba(255,255,255,0.7); }

    /* Main */
    .admin-main { padding: 2.5rem 2rem; max-width: 1200px; margin: 0 auto; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid rgba(198, 150, 58, 0.22);
      padding: 1.5rem 1.25rem;
    }
    .stat-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: var(--mauve);
      line-height: 1;
    }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 0.35rem;
    }
    .stat-card.teal .stat-value { color: var(--teal); }
    .stat-card.gold  .stat-value { color: var(--gold);  }

    /* Table section */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .table-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-dark);
    }
    .table-count {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--text-light);
    }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      font-size: 0.88rem;
    }
    thead {
      background: var(--cream);
      border-bottom: 1px solid rgba(198, 150, 58, 0.25);
    }
    th {
      padding: 0.9rem 1rem;
      text-align: left;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-medium);
      white-space: nowrap;
    }
    td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(198, 150, 58, 0.1);
      vertical-align: top;
      color: var(--text-medium);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(250, 246, 239, 0.6); }

    .col-id { color: var(--text-light); font-size: 0.8rem; width: 40px; }
    .guest-name { font-weight: 700; color: var(--text-dark); margin-bottom: 0.15rem; }
    .guest-sub { font-size: 0.8rem; color: var(--text-light); }
    .col-notes { max-width: 180px; font-size: 0.83rem; color: var(--text-light); }
    .col-date { font-size: 0.8rem; white-space: nowrap; }
    .none { color: var(--text-light); }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge.yes { background: rgba(46, 125, 122, 0.1); color: var(--teal); }
    .badge.no  { background: rgba(156, 123, 106, 0.1); color: var(--text-light); font-weight: 400; }

    .loading, .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-light);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    .empty.error { color: var(--mauve); }

    @media (max-width: 600px) {
      .admin-header { flex-direction: column; align-items: flex-start; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-header-left">
      <h1>Srivaths &amp; Sulakshana — RSVP Admin</h1>
      <p>June 6, 2026 &nbsp;·&nbsp; BAPS Chino Hills</p>
    </div>
    <div class="admin-header-right">
      <button class="btn btn-home" onclick="window.open('/', '_blank')">View Site</button>
      <button class="btn btn-refresh" id="refresh-btn">Refresh</button>
      <button class="btn btn-export" id="export-btn">Export CSV</button>
    </div>
  </header>

  <main class="admin-main">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <p class="stat-label">Total RSVPs</p>
        <p class="stat-value" id="stat-total">—</p>
        <p class="stat-sub">responses received</p>
      </div>
      <div class="stat-card teal">
        <p class="stat-label">Muhurtham RSVPs</p>
        <p class="stat-value" id="stat-m-rsvps">—</p>
        <p class="stat-sub"><span id="stat-m-guests">—</span> guests total</p>
      </div>
      <div class="stat-card gold">
        <p class="stat-label">Reception RSVPs</p>
        <p class="stat-value" id="stat-r-rsvps">—</p>
        <p class="stat-sub"><span id="stat-r-guests">—</span> guests total</p>
      </div>
    </div>

    <!-- Table -->
    <div class="table-header">
      <p class="table-title">All Responses</p>
      <p class="table-count" id="table-count"></p>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Guest</th>
            <th>Muhurtham</th>
            <th>Reception</th>
            <th>Notes</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="rsvp-tbody">
          <tr><td colspan="6" class="loading">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="js/admin.js"></script>
</body>
</html>
